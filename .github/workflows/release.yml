name: Release VSIX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies --out "copilot-compact-${GITHUB_REF_NAME}.vsix"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "copilot-compact-${GITHUB_REF_NAME}.vsix" \
            --title "Copilot Compact ${GITHUB_REF_NAME}" \
            --notes "VSCode extension package for Copilot Compact."
